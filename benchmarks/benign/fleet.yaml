# Phase-4 multi-server BENIGN fleet — the aggregate `fleet verify` must return
# exit 0 (no server on the fleet false-positives on legitimate traffic).
# Policies in policy_dir are regenerated by run_benign.py from benign_cases.yaml
# (infer + approve) so manifest hashes always match.
version: "0.1"

defaults:
  backend: mock
  mode: observe
  manifest_dir: manifests
  policy_dir: policies

servers:
  fs-workspace:
    launch: {command: mock}
    manifest: filesystem.json
    policy: fs-workspace.policy.yaml
    events: events/fs-workspace.jsonl
    labels: {suite: benign, team: platform, env: prod}

  fetch-web:
    launch: {command: mock}
    manifest: fetch.json
    policy: fetch-web.policy.yaml
    events: events/fetch-web.jsonl
    labels: {suite: benign, team: web, env: prod}

  yfinance-report:
    launch: {command: mock}
    manifest: yfinance.json
    policy: yfinance-report.policy.yaml
    events: events/yfinance-report.jsonl
    labels: {suite: benign, team: finance, env: prod}

  memory-graph:
    launch: {command: mock}
    manifest: memory.json
    policy: memory-graph.policy.yaml
    events: events/memory-graph.jsonl
    labels: {suite: benign, team: platform, env: prod}
